<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MBC 라디오">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hR8Nf8x/mbc-icon.png">
    
    <title>MBC Standard FM (Global Fix)</title>
    <style>
        :root { --primary: #007aff; --bg: #0a0a0c; --card: rgba(28, 28, 30, 0.85); --text: #ffffff; --text-sub: #a1a1a6; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .player-card { 
            background: var(--card); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            width: 90%; max-width: 380px; border-radius: 48px; padding: 40px 25px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }

        .clocks { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; font-size: 0.7rem; color: #34c759; letter-spacing: 1px; }
        .station-logo { width: 60px; height: 60px; background: linear-gradient(135deg, #007aff, #5856d6); border-radius: 16px; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.1rem; }
        
        h1 { font-size: 1.4rem; margin: 0 0 4px 0; }
        .location { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .pulse { width: 6px; height: 6px; background: #34c759; border-radius: 50%; animation: p 2s infinite; }
        @keyframes p { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .viz { display: flex; justify-content: center; align-items: center; gap: 4px; height: 35px; margin-bottom: 30px; }
        .bar { width: 4px; height: 6px; background: var(--primary); border-radius: 2px; transition: 0.3s; }
        .playing .bar { animation: w 1.2s infinite ease-in-out; }
        @keyframes w { 0%, 100% { height: 6px; } 50% { height: 35px; } }

        #play-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: white; cursor: pointer; display: flex; justify-content: center; align-items: center; margin: 0 auto; }
        .play-icon { width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid black; margin-left: 5px; }
        .pause-icon { width: 20px; height: 24px; display: none; gap: 5px; }
        .pause-icon::before, .pause-icon::after { content: ''; flex: 1; background: black; border-radius: 2px; }
        .is-playing .play-icon { display: none; }
        .is-playing .pause-icon { display: flex; }
        .is-playing #play-btn { background: var(--primary); }
        .is-playing .pause-icon::before, .is-playing .pause-icon::after { background: white; }

        #msg { margin-top: 25px; font-size: 0.8rem; color: var(--text-sub); min-height: 1.5rem; }
        #debug { position: absolute; bottom: 15px; font-size: 10px; color: rgba(255,255,255,0.15); width: 100%; left: 0; text-align: center; }
        
        button#retry-btn { margin-top: 10px; background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--text-sub); padding: 5px 15px; border-radius: 15px; font-size: 11px; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clocks">SYD <span id="st">--:--</span> | SEL <span id="kt">--:--</span></div>
        <div class="player-card">
            <div class="station-logo">MBC</div>
            <h1>표준FM</h1>
            <div class="location"><span class="pulse"></span> AUSTRALIA ⇄ KOREA</div>
            
            <div class="viz" id="viz">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <button id="play-btn"><div class="play-icon"></div><div class="pause-icon"></div></button>
            <div id="msg">준비 완료</div>
            <button id="retry-btn" onclick="location.reload()">수동 새로고침</button>
        </div>
    </div>
    <div id="debug">System Stable</div>

    <audio id="audio" playsinline webkit-playsinline></audio>

    <script>
        const audio = document.getElementById('audio');
        const btn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');
        const viz = document.getElementById('viz');
        const debug = document.getElementById('debug');

        // 시계
        function t() {
            const now = new Date();
            const opt = { hour:'2-digit', minute:'2-digit', hour12:false };
            document.getElementById('st').innerText = now.toLocaleTimeString('en-AU', { ...opt, timeZone:'Australia/Sydney'});
            document.getElementById('kt').innerText = now.toLocaleTimeString('ko-KR', { ...opt, timeZone:'Asia/Seoul'});
        }
        setInterval(t, 1000); t();

        // [핵심] 호주에서 접속 가능한 4개 소스
        const SOURCES = [
            'https://mini-sfm.akamaized.net/sfm/sfm/playlist.m3u8', // 1. Akamai CDN (Global)
            'https://sfm-hls.imbc.com/sfm/sfm.stream/playlist.m3u8', // 2. 본사 HLS
            'https://stream.bsmbc.com/live/mp4:BusanMBC-LiveStream-AM/playlist.m3u8', // 3. 부산MBC (해외 우회용)
            'https://5ddfd163bd00d.streamlock.net/STDFM/STDFM/playlist.m3u8' // 4. 울산MBC (비상용)
        ];

        let idx = 0;
        let isPlaying = false;

        async function start() {
            msg.innerText = `연결 중 (채널 ${idx + 1}/4)...`;
            msg.style.color = "var(--text-sub)";
            
            try {
                const url = SOURCES[idx];
                debug.innerText = `Attempting: ${url.split('/')[2]}`;
                
                audio.src = `${url}?t=${Date.now()}`;
                audio.load();
                
                // 아이폰은 반드시 play()를 비동기로 기다려야 함
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    await playPromise;
                    isPlaying = true;
                    document.body.classList.add('is-playing');
                    viz.classList.add('playing');
                    msg.innerText = "● 실시간 방송 중";
                    msg.style.color = "#34c759";
                    document.getElementById('retry-btn').style.display = "none";
                }
            } catch (e) {
                console.error(e);
                next();
            }
        }

        function next() {
            idx++;
            if (idx < SOURCES.length) {
                msg.innerText = `채널 전환 중 (${idx + 1}/${SOURCES.length})...`;
                setTimeout(start, 1500);
            } else {
                idx = 0; // 다시 처음부터
                msg.innerText = "모든 경로 실패. 새로고침 하세요.";
                msg.style.color = "#ff3b30";
                document.getElementById('retry-btn').style.display = "inline-block";
            }
        }

        btn.onclick = () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.body.classList.remove('is-playing');
                viz.classList.remove('playing');
                msg.innerText = "일시 정지됨";
            } else {
                start();
            }
        };

        // 자동 복구 로직
        audio.onwaiting = () => { if(isPlaying) msg.innerText = "버퍼링 중..."; };
        audio.onplaying = () => { if(isPlaying) msg.innerText = "● 실시간 방송 중"; };
        audio.onerror = () => { if(isPlaying) { debug.innerText = "Error detected, skipping..."; next(); } };

        // 백그라운드 복귀 대응
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isPlaying && audio.paused) {
                audio.play().catch(start);
            }
        });
    </script>
</body>
</html>
