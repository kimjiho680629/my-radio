<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MBC 라디오">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hR8Nf8x/mbc-icon.png">
    
    <title>MBC Standard FM (Australia Edition)</title>
    <style>
        :root {
            --primary: #007aff;
            --primary-gradient: linear-gradient(135deg, #007aff, #5856d6);
            --bg: #000000;
            --card-bg: rgba(40, 40, 45, 0.75);
            --card-border: rgba(255, 255, 255, 0.2);
            --text: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --glass-blur: 30px;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(88, 86, 214, 0.3) 0px, transparent 50%);
            color: var(--text);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; z-index: 1; }

        .clocks {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
            font-size: 0.9rem; color: var(--text-sub); font-weight: 600; letter-spacing: 0.5px;
        }
        .clocks span { color: var(--text); font-variant-numeric: tabular-nums; }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border-radius: 50px; padding: 45px 30px; text-align: center;
            border: 1px solid var(--card-border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
        }

        .station-logo {
            width: 90px; height: 90px; background: var(--primary-gradient);
            border-radius: 22px; margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1.6rem; color: white;
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.4);
        }

        h1 { font-size: 2.2rem; margin: 0 0 8px 0; font-weight: 800; letter-spacing: -1px; }
        .location { 
            font-size: 0.9rem; color: #34c759; margin-bottom: 30px; 
            display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700;
        }
        .pulse {
            width: 8px; height: 8px; background: #34c759; border-radius: 50%;
            animation: p 2s infinite; box-shadow: 0 0 8px #34c759;
        }
        @keyframes p { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }

        .data-info {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.1); padding: 12px 25px; border-radius: 20px;
            width: fit-content; margin: 0 auto 35px;
        }
        .data-item { display: flex; flex-direction: column; align-items: center; }
        .data-label { opacity: 0.5; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .data-value { color: var(--text); font-weight: 700; font-size: 0.95rem; }

        .visualizer { display: flex; justify-content: center; align-items: center; gap: 6px; height: 40px; margin-bottom: 40px; }
        .bar { width: 6px; height: 6px; background: var(--text); opacity: 0.2; border-radius: 3px; transition: 0.3s; }
        .playing .bar { background: var(--primary); opacity: 1; animation: w 1.2s infinite ease-in-out; }
        @keyframes w { 0%, 100% { height: 6px; } 50% { height: 40px; } }
        .bar:nth-child(2) { animation-delay: 0.1s; } .bar:nth-child(3) { animation-delay: 0.2s; } .bar:nth-child(4) { animation-delay: 0.3s; }

        #play-btn {
            width: 85px; height: 85px; border-radius: 50%; border: none;
            background: white; cursor: pointer; display: flex; justify-content: center; align-items: center;
            margin: 0 auto; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); transition: 0.2s;
        }
        #play-btn:active { transform: scale(0.92); }
        .play-icon { width: 0; height: 0; border-top: 14px solid transparent; border-bottom: 14px solid transparent; border-left: 22px solid black; margin-left: 6px; }
        .pause-icon { width: 24px; height: 26px; display: none; gap: 7px; }
        .pause-icon::before, .pause-icon::after { content: ''; flex: 1; background: black; border-radius: 3px; }
        
        .is-playing .play-icon { display: none; }
        .is-playing .pause-icon { display: flex; }

        .volume-container { margin-top: 30px; width: 100%; display: flex; align-items: center; gap: 15px; }
        #volume-slider { flex: 1; -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 5px; border-radius: 3px; outline: none; }
        #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: white; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

        #msg { margin-top: 30px; font-size: 0.9rem; color: var(--text-sub); min-height: 1.2rem; }
        #debug { position: absolute; bottom: 20px; font-size: 10px; color: rgba(255,255,255,0.2); width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clocks">SYD <span id="st">--:--</span> | SEL <span id="kt">--:--</span></div>
        <div class="player-card">
            <div class="station-logo">MBC</div>
            <h1>표준FM</h1>
            <div class="location"><span class="pulse"></span> AUSTRALIA ⇄ KOREA</div>
            
            <div class="data-info">
                <div class="data-item"><span class="data-label">Bitrate</span> <span class="data-value" id="rate-val">0</span></div>
                <div class="data-item"><span class="data-label">Usage</span> <span class="data-value" id="total-val">0.00MB</span></div>
            </div>

            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <button id="play-btn"><div class="play-icon"></div><div class="pause-icon"></div></button>
            
            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
                <span>🔊</span>
            </div>

            <div id="msg">준비 완료</div>
        </div>
    </div>
    <div id="debug">System Initialized</div>

    <audio id="audio" playsinline webkit-playsinline></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const msg = document.getElementById('msg');
        const visualizer = document.getElementById('visualizer');
        const debug = document.getElementById('debug');
        const rateVal = document.getElementById('rate-val');
        const totalVal = document.getElementById('total-val');

        const SOURCES = [
            'https://mini-sfm.akamaized.net/sfm/sfm/playlist.m3u8',
            'https://minimw.imbc.com/dsfm/_definst_/sfm.stream/playlist.m3u8',
            'https://sfm-hls.imbc.com/sfm/sfm.stream/playlist.m3u8',
            'https://stream.bsmbc.com/live/mp4:BusanMBC-LiveStream-AM/playlist.m3u8'
        ];

        let idx = 0;
        let isPlaying = false;
        let totalBytes = 0;
        let lastTrackTime = 0;

        // [수정] 시계 로직 강화
        function updateClocks() {
            try {
                const now = new Date();
                const formatter = (tz) => new Intl.DateTimeFormat('en-GB', {
                    hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz
                }).format(now);

                document.getElementById('st').innerText = formatter('Australia/Sydney');
                document.getElementById('kt').innerText = formatter('Asia/Seoul');
            } catch (e) {
                console.error("Clock Error:", e);
            }
        }
        setInterval(updateClocks, 1000); updateClocks();

        // 재생 로직
        async function togglePlay() {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                document.body.classList.remove('is-playing');
                visualizer.classList.remove('playing');
                msg.innerText = "일시 정지됨";
            } else {
                msg.innerText = "연결 중...";
                try {
                    audio.src = SOURCES[idx] + "?t=" + Date.now();
                    await audio.play();
                    isPlaying = true;
                    document.body.classList.add('is-playing');
                    visualizer.classList.add('playing');
                    msg.innerText = "● 실시간 방송 중";
                    debug.innerText = "Connected to: " + new URL(SOURCES[idx]).hostname;
                } catch (e) {
                    console.error("Play Error:", e);
                    idx = (idx + 1) % SOURCES.length;
                    setTimeout(togglePlay, 500);
                }
            }
        }

        playBtn.onclick = togglePlay;
        volumeSlider.oninput = (e) => audio.volume = e.target.value;

        // 데이터 트래킹
        setInterval(() => {
            if (isPlaying && !audio.paused) {
                const now = Date.now();
                if (lastTrackTime > 0) {
                    const delta = (now - lastTrackTime) / 1000;
                    totalBytes += (128 * 1024 / 8) * delta;
                    rateVal.innerText = "128k";
                    totalVal.innerText = (totalBytes / (1024 * 1024)).toFixed(2) + "MB";
                }
                lastTrackTime = now;
            }
        }, 1000);

        // 자동 복구
        audio.onwaiting = () => { if(isPlaying) msg.innerText = "버퍼링 중..."; };
        audio.onplaying = () => { if(isPlaying) msg.innerText = "● 실시간 방송 중"; };
        audio.onerror = () => { if(isPlaying) togglePlay(); };
    </script>
</body>
</html>
