<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MBC 라디오">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hR8Nf8x/mbc-icon.png">
    
    <!-- 접속 속도 최적화를 위한 사전 연결 -->
    <link rel="preconnect" href="https://mini-sfm.akamaized.net">
    <link rel="preconnect" href="https://minimw.imbc.com">
    <link rel="preconnect" href="https://sfm-hls.imbc.com">
    <link rel="preconnect" href="https://stream.bsmbc.com">
    
    <title>MBC Standard FM (Australia Edition)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="clocks">SYD <span id="st">--:--</span> | SEL <span id="kt">--:--</span></div>
        <div class="player-card">
            <div class="station-logo">MBC</div>
            <h1>표준FM</h1>
            <div class="location"><span class="pulse"></span> AUSTRALIA ⇄ KOREA</div>
            
            <div class="data-info">
                <div class="data-item"><span class="data-label">RATE</span> <span class="data-value" id="rate-val">0</span> <span class="data-label">kbps</span></div>
                <div class="data-item"><span class="data-label">TOTAL</span> <span class="data-value" id="total-val">0.00</span> <span class="data-label">MB</span></div>
            </div>

            <div class="visualizer" id="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <div class="controls">
                <button id="play-btn">
                    <div class="play-icon"></div>
                    <div class="pause-icon"></div>
                </button>
                
                <div class="volume-container">
                    <span class="volume-icon">🔈</span>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                    <span class="volume-icon">🔊</span>
                </div>
            </div>

            <div id="msg">준비 완료</div>
            <button id="retry-btn">다시 시도</button>
        </div>
    </div>
    <div id="debug">System Stable</div>

    <audio id="audio" playsinline webkit-playsinline></audio>
    <script src="app.js"></script>
</body>
</html>
