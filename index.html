<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MBC 라디오">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hR8Nf8x/mbc-icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://mini-sfm.akamaized.net">
    <link rel="preconnect" href="https://sfm-hls.imbc.com">
    <link rel="preconnect" href="https://minimw.imbc.com">
    <title>MBC 표준FM</title>
    <style>
        :root {
            --primary: #007aff;
            --primary-gradient: linear-gradient(135deg, #007aff, #5856d6);
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.45);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.55);
            --green: #34c759;
            --red: #ff3b30;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(88, 86, 214, 0.15) 0px, transparent 50%);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* ── 시계 ── */
        .clocks {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 1px;
        }
        .clocks span {
            color: var(--text);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        /* ── 카드 ── */
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            width: 100%;
            max-width: 400px;
            border-radius: 50px;
            padding: 40px 30px;
            text-align: center;
            border: 1.5px solid var(--card-border);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
        }

        .station-logo {
            width: 90px; height: 90px;
            background: var(--primary-gradient);
            border-radius: 22px;
            margin: 0 auto 25px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1.6rem; color: white;
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.3);
        }

        h1 { font-size: 2.2rem; margin: 0 0 8px; font-weight: 700; letter-spacing: -1px; }

        .location {
            font-size: 0.9rem; color: var(--text-sub);
            margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-weight: 500;
        }

        .pulse {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse-anim 2s infinite;
        }

        @keyframes pulse-anim {
            0%   { opacity: 1; transform: scale(1);   box-shadow: 0 0 0 0   rgba(52,199,89,.4); }
            70%  { opacity: .5; transform: scale(1.2); box-shadow: 0 0 0 10px rgba(52,199,89,0); }
            100% { opacity: 1; transform: scale(1);   box-shadow: 0 0 0 0   rgba(52,199,89,0); }
        }

        /* ── 데이터 정보 ── */
        .data-info {
            display: flex; justify-content: center; gap: 15px;
            margin: 0 auto 35px;
            background: rgba(255,255,255,.06);
            padding: 12px 20px; border-radius: 20px; width: fit-content;
        }
        .data-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .data-label { opacity: .5; font-size: .55rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
        .data-value { font-weight: 700; font-size: .9rem; }

        /* ── 시각화 바 ── */
        .visualizer {
            display: flex; justify-content: center; align-items: center;
            gap: 5px; height: 40px; margin-bottom: 40px;
        }
        .bar {
            width: 5px; height: 6px;
            background: var(--text); opacity: .2;
            border-radius: 3px; transition: all .3s;
        }
        .playing .bar {
            background: var(--primary); opacity: 1;
            animation: bounce 1.2s infinite ease-in-out;
        }
        .bar:nth-child(2) { animation-delay: .15s; }
        .bar:nth-child(3) { animation-delay: .30s; }
        .bar:nth-child(4) { animation-delay: .45s; }
        .bar:nth-child(5) { animation-delay: .60s; }
        @keyframes bounce {
            0%, 100% { height: 6px; }
            50%       { height: 40px; }
        }

        /* ── 컨트롤 ── */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 30px; }

        .sub-btn {
            width: 44px; height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            color: white; font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .sub-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.15); }

        /* ── 플레이 버튼 (3가지 상태) ── */
        #play-btn {
            width: 80px; height: 80px;
            border-radius: 50%; border: none;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.15s ease;
            /* 기본(정지) 상태: 흰색 */
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,.2);
        }
        #play-btn:active { transform: scale(0.92); }

        /* 로딩 상태: 반투명 흰색 + 파동 애니메이션 */
        #play-btn.state-loading {
            background: rgba(255,255,255,.2);
            animation: btn-wave 1.2s ease-in-out infinite;
        }
        @keyframes btn-wave {
            0%, 100% { box-shadow: 0 15px 35px rgba(0,122,255,.1), 0 0 0 0   rgba(0,122,255,.3); }
            50%       { box-shadow: 0 15px 35px rgba(0,122,255,.3), 0 0 0 18px rgba(0,122,255,0); }
        }

        /* 재생 상태: 파란 그라데이션 */
        #play-btn.state-playing {
            background: linear-gradient(135deg, #007aff, #5856d6);
            box-shadow: 0 15px 35px rgba(0,122,255,.5);
            animation: none;
        }

        /* 버튼 내부 아이콘 */
        .play-icon {
            width: 0; height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid black; /* 흰 배경 위 → 검정 */
            margin-left: 6px;
            flex-shrink: 0;
        }
        .pause-icon {
            width: 22px; height: 24px;
            display: none; gap: 6px;
            flex-shrink: 0;
        }
        .pause-icon::before, .pause-icon::after {
            content: ''; flex: 1;
            background: white; /* 파란 배경 위 → 흰색 */
            border-radius: 3px;
        }
        .spinner {
            display: none;
            width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,.25);
            border-top-color: rgba(255,255,255,.9);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 상태별 아이콘 표시 제어 */
        #play-btn.state-loading .play-icon  { display: none; }
        #play-btn.state-loading .pause-icon { display: none; }
        #play-btn.state-loading .spinner    { display: block; }

        #play-btn.state-playing .play-icon  { display: none; }
        #play-btn.state-playing .pause-icon { display: flex; }

        /* ── 볼륨 ── */
        .volume-container {
            width: 100%; max-width: 280px;
            display: flex; align-items: center; gap: 12px;
        }
        .volume-icon { font-size: 1.1rem; opacity: .5; }
        #volume-slider {
            flex: 1; -webkit-appearance: none;
            background: rgba(255,255,255,.15);
            height: 6px; border-radius: 3px; outline: none;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 24px;
            background: white; border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0,0,0,.3);
        }

        /* ── 상태 메시지 ── */
        #msg {
            margin-top: 30px;
            font-size: .85rem; font-weight: 500;
            color: var(--text-sub);
            min-height: 1.2rem;
            transition: color .3s;
        }

        /* ── 재시도 버튼 ── */
        #retry-btn {
            display: none;
            margin-top: 15px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.2);
            color: var(--text);
            padding: 10px 24px;
            border-radius: 20px;
            font-size: .8rem; font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        #retry-btn:active { background: rgba(255,255,255,.2); }

        /* ── 디버그 ── */
        #debug {
            position: absolute; bottom: 20px;
            font-size: 10px; color: rgba(255,255,255,.2);
            width: 100%; left: 0; text-align: center; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clocks">SYD <span id="st">--:--</span> | SEL <span id="kt">--:--</span></div>
        <div class="player-card">
            <div class="station-logo">MBC</div>
            <h1>표준FM</h1>
            <div class="location"><span class="pulse"></span> AUSTRALIA ⇄ KOREA</div>
            <div class="data-info">
                <div class="data-item">
                    <span class="data-label">RATE</span>
                    <span class="data-value" id="rate-val">—</span>
                    <span class="data-label">kbps</span>
                </div>
                <div class="data-item">
                    <span class="data-label">TOTAL</span>
                    <span class="data-value" id="total-val">0.00</span>
                    <span class="data-label">MB</span>
                </div>
            </div>
            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="controls">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <button id="sync-btn" class="sub-btn" title="강제 동기화">🔄</button>
                    <button id="play-btn">
                        <div class="play-icon"></div>
                        <div class="pause-icon"></div>
                        <div class="spinner"></div>
                    </button>
                    <div style="width: 44px;"></div> <!-- 밸런스를 위한 더미 -->
                </div>
                <div class="volume-container">
                    <span class="volume-icon">🔈</span>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                </div>
            </div>
            <div id="msg">재생 버튼을 누르세요</div>
            <button id="retry-btn">다시 시도</button>
        </div>
    </div>
    <div id="debug">System Ready</div>

    <audio id="audio" playsinline webkit-playsinline preload="none"></audio>

    <!--
        HLS.js: 비-iOS 브라우저(Chrome, Firefox, Edge 등)에서 HLS 스트림 제어.
        iOS Safari는 네이티브 HLS를 사용하며 HLS.js가 지원되지 않으므로 자동으로 fallback됨.
    -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const audio      = document.getElementById('audio');
        const playBtn    = document.getElementById('play-btn');
        const volSlider  = document.getElementById('volume-slider');
        const msg        = document.getElementById('msg');
        const visualizer = document.getElementById('visualizer');
        const debug      = document.getElementById('debug');
        const rateVal    = document.getElementById('rate-val');
        const totalVal   = document.getElementById('total-val');
        const retryBtn   = document.getElementById('retry-btn');
        const syncBtn    = document.getElementById('sync-btn');
        const stEl       = document.getElementById('st');
        const ktEl       = document.getElementById('kt');

        // ── 스트리밍 소스 ────────────────────────────────────────
        //
        // ★ 호주(시드니)에서 실측 테스트 결과 (2026-04-02, TPG Telecom):
        //
        //   [PRIMARY]  5ddfd163bd00d.streamlock.net  → 200 OK, 10/10 성공
        //              TTFB ~2초, 다운로드 ~75 KB/s (128kbps 재생에 충분)
        //              울산 MBC STDFM (표준FM 동일 콘텐츠) - 해외 접속 가능
        //
        //   [DEAD - 해외 차단됨]
        //   mini-sfm.akamaized.net   → DNS 없음 (도메인 폐기)
        //   sfm-hls.imbc.com         → DNS 없음 (한국 IP 전용)
        //   minimw.imbc.com          → HTTP 400  (해외 IP 차단)
        //   stream.bsmbc.com         → TCP 불가  (포트 차단)
        //   live.dgmbc.com           → DNS 없음  (한국 IP 전용)
        //
        // ────────────────────────────────────────────────────────

        const SOURCES = [
            // 1순위: 호주에서 유일하게 작동하는 서버 (Wowza/Streamlock, 해외 개방)
            'https://5ddfd163bd00d.streamlock.net/STDFM/STDFM/playlist.m3u8',

            // 2~6순위: 한국 내 접속 또는 향후 복구 대비 (현재 호주에서 불가)
            'https://sfm-hls.imbc.com/sfm/sfm.stream/playlist.m3u8',
            'https://minimw.imbc.com/dsfm/_definst_/sfm.stream/playlist.m3u8',
            'https://mini-sfm.akamaized.net/sfm/sfm/playlist.m3u8',
            'https://stream.bsmbc.com/live/mp4:BusanMBC-LiveStream-AM/playlist.m3u8',
            'https://live.dgmbc.com/dgfm/dgfm.stream/playlist.m3u8',
        ];

        // 1순위 서버는 연결 실패 시 바로 전환하지 않고 N회 재시도 (안정적이므로)
        const PRIMARY_MAX_RETRY = 3;
        const AUTO_RETRY_DELAY  = 20000; // 모든 소스 실패 후 자동 재시도 간격 (ms)
        const BUFFER_TIMEOUT    = 10000; // 버퍼링 대기 한계 (빠른 복구를 위해 10초로 단축)
        const STALL_JUMP_SEC    =     3; // N초 멈춤 → 안전 마진(-30초) 점프 (더 빨리 대응)
        const STALL_RELOAD_SEC  =     7; // N초 멈춤 → 동일 소스 강제 재로드 (반복 현상 방지)
        const STALL_SWITCH_SEC  =    12; // N초 멈춤 → 다음 소스 전환
        const JUMP_MARGIN       =    30; // 라이브 엣지로부터의 지연 시간 (30초 확보로 안정성 극대화)

        let hls             = null;
        let srcIdx          = 0;
        let primaryRetry    = 0;     // 1순위 서버 재시도 횟수
        let userWantsPlay   = false; // 사용자 의도: true면 재연결 로직 활성화
        let isLive          = false; // 실제 오디오 재생 여부
        let totalBytes      = 0;
        let lastMs          = 0;
        let lastAudioTime   = -1;
        let stallCount      = 0;
        let bufferTimer     = null;
        let autoRetryTimer  = null;

        // ── 시계 ─────────────────────────────────────────────
        function tick() {
            const now = new Date();
            const opt = { hour: '2-digit', minute: '2-digit', hour12: false };
            stEl.innerText = now.toLocaleTimeString('en-AU', { ...opt, timeZone: 'Australia/Sydney' });
            ktEl.innerText = now.toLocaleTimeString('ko-KR', { ...opt, timeZone: 'Asia/Seoul' });
        }
        setInterval(tick, 1000);
        tick();

        // ── 데이터 사용량 & 스톨 감지 (1초 간격) ────────────
        setInterval(() => {
            if (!isLive) {
                lastMs = 0;
                stallCount = 0;
                return;
            }

            // 데이터 사용량 추정 (128kbps 고정)
            const now = Date.now();
            if (lastMs > 0) {
                const dt = (now - lastMs) / 1000;
                totalBytes += (128 * 1024 / 8) * dt;
                rateVal.innerText = '128';
                totalVal.innerText = (totalBytes / (1024 * 1024)).toFixed(2);
            }
            lastMs = now;

            // 스톨 감지: currentTime이 멈추면 카운트
            if (audio.currentTime === lastAudioTime) {
                stallCount++;
                if (stallCount === STALL_JUMP_SEC) {
                    debug.innerText = `Stall ×${STALL_JUMP_SEC} — buffering (jump -30s)...`;
                    jumpToLive();
                } else if (stallCount === STALL_RELOAD_SEC) {
                    debug.innerText = `Stall ×${STALL_RELOAD_SEC} — force reload...`;
                    loadSource(srcIdx); // 7초 멈춤 시 세션 강제 초기화 (소리 반복 방지)
                } else if (stallCount >= STALL_SWITCH_SEC) {
                    debug.innerText = `Stall ×${STALL_SWITCH_SEC} — switching source...`;
                    stallCount = 0;
                    tryNext();
                }
            } else {
                stallCount = 0;
            }
            lastAudioTime = audio.currentTime;
        }, 1000);

        // ── 수동 동기화 ──────────────────────────────────────
        syncBtn.onclick = () => {
            if (userWantsPlay) {
                debug.innerText = 'Manual force reload triggered...';
                loadSource(srcIdx);
            }
        };

        // ── HLS 초기화 ────────────────────────────────────────
        function destroyHls() {
            clearTimeout(bufferTimer);
            clearTimeout(autoRetryTimer);
            bufferTimer = autoRetryTimer = null;

            if (hls) {
                hls.destroy();
                hls = null;
            }
            audio.removeAttribute('src');
            audio.load();
            isLive = false;
        }

        function loadSource(idx) {
            destroyHls();
            if (!userWantsPlay) return;

            retryBtn.style.display = 'none';
            const url = SOURCES[idx];
            setUI('loading', `연결 중... (${idx + 1}/${SOURCES.length})`);
            debug.innerText = `Connecting: ${new URL(url).hostname}`;

            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                // ─ HLS.js 경로 (Chrome, Firefox, Edge 등) ─
                hls = new Hls({
                    // ★ 끊김 방지 최우선: 극단적 버퍼링 및 지연 허용 설정
                    liveSyncDurationCount:       5,   // 라이브 엣지에서 5세그먼트(약 30초) 뒤에서 재생 (버퍼 확보)
                    liveMaxLatencyDurationCount: 10,  // 최대 10세그먼트 지연 허용
                    manifestLoadingTimeOut:  15000,
                    manifestLoadingMaxRetry:     3,
                    levelLoadingTimeOut:     15000,
                    levelLoadingMaxRetry:        3,
                    fragLoadingTimeOut:      15000,
                    fragLoadingMaxRetry:         5,
                    maxBufferLength:            60,   // 버퍼를 최대 60초 확보 (네트워크 불안정 대비)
                    maxMaxBufferLength:        120,   // 메모리상 최대 버퍼 120초
                    nudgeMaxRetry:               5,
                    startFragPrefetch:         true,
                });

                hls.loadSource(url);
                hls.attachMedia(audio);

                hls.once(Hls.Events.MANIFEST_PARSED, () => {
                    audio.play().catch(() => tryNext());
                });

                hls.on(Hls.Events.ERROR, (_, data) => {
                    if (!userWantsPlay || !data.fatal) return;
                    debug.innerText = `HLS [${data.type}] ${data.details}`;
                    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        hls.recoverMediaError(); // 미디어 에러는 복구 시도
                    } else {
                        tryNext();               // 네트워크/기타 치명 에러 → 다음 소스
                    }
                });

            } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                // ─ iOS Safari 네이티브 HLS 경로 ─
                audio.src = url;
                audio.load();
                audio.play().catch(() => tryNext());

            } else {
                setUI('error', 'HLS를 지원하지 않는 브라우저입니다.');
            }
        }

        // ── 다음 소스 시도 ────────────────────────────────────
        function tryNext() {
            if (!userWantsPlay) return;
            isLive = false;

            // 1순위 서버(srcIdx===0)는 안정적이므로 바로 전환하지 않고 재시도
            if (srcIdx === 0 && primaryRetry < PRIMARY_MAX_RETRY) {
                primaryRetry++;
                debug.innerText = `Primary retry ${primaryRetry}/${PRIMARY_MAX_RETRY}...`;
                setTimeout(() => loadSource(0), 1500);
                return;
            }

            primaryRetry = 0;
            srcIdx++;
            if (srcIdx < SOURCES.length) {
                setTimeout(() => loadSource(srcIdx), 400);
            } else {
                // 모든 소스 실패 → 자동 재시도
                srcIdx = 0;
                setUI('error', '연결 실패 — 잠시 후 재시도합니다');
                retryBtn.style.display = 'inline-block';
                autoRetryTimer = setTimeout(() => {
                    if (userWantsPlay) { primaryRetry = 0; loadSource(0); }
                }, AUTO_RETRY_DELAY);
            }
        }

        // ── 라이브 엣지 점프 ──────────────────────────────────
        function jumpToLive() {
            try {
                if (hls && hls.liveSyncPosition && isFinite(hls.liveSyncPosition)) {
                    // HLS.js: 설정된 지연 시간만큼 뒤로 점프 (약 30초)
                    audio.currentTime = hls.liveSyncPosition;
                } else if (audio.seekable && audio.seekable.length > 0) {
                    // iOS 네이티브: 라이브 엣지에서 JUMP_MARGIN(30초) 만큼 뒤로 점프하여 넉넉한 버퍼 확보
                    let target = audio.seekable.end(0) - JUMP_MARGIN;
                    if (target < audio.seekable.start(0)) target = audio.seekable.start(0);
                    audio.currentTime = target;
                }
                audio.play().catch(() => tryNext());
            } catch (e) {
                tryNext();
            }
        }

        // ── UI 상태 관리 ──────────────────────────────────────
        // state: 'idle' | 'loading' | 'playing' | 'error'
        function setUI(state, text) {
            playBtn.classList.remove('state-loading', 'state-playing');

            if (state === 'loading') playBtn.classList.add('state-loading');
            if (state === 'playing') playBtn.classList.add('state-playing');

            visualizer.classList.toggle('playing', state === 'playing');

            if (text !== undefined) msg.innerText = text;
            msg.style.color = state === 'playing' ? 'var(--green)'
                            : state === 'error'   ? 'var(--red)'
                            : 'var(--text-sub)';
        }

        // ── 이벤트: 플레이 버튼 ──────────────────────────────
        playBtn.onclick = () => {
            if (userWantsPlay) {
                // 재생 중 → 정지
                userWantsPlay = false;
                destroyHls();
                setUI('idle', '일시 정지됨');
                rateVal.innerText = '—';
                retryBtn.style.display = 'none';
            } else {
                // 정지 중 → 재생
                userWantsPlay = true;
                srcIdx = 0;
                primaryRetry = 0;
                loadSource(0);
            }
        };

        retryBtn.onclick = () => {
            retryBtn.style.display = 'none';
            srcIdx = 0;
            loadSource(0);
        };

        volSlider.oninput = e => { audio.volume = e.target.value; };

        // ── Audio 이벤트 ─────────────────────────────────────
        audio.onplaying = () => {
            if (!userWantsPlay) return;
            clearTimeout(bufferTimer);
            isLive = true;
            stallCount = 0;
            setUI('playing', '● 실시간 방송 중');
            debug.innerText = `Live ✓ ${SOURCES[srcIdx] ? new URL(SOURCES[srcIdx]).hostname : ''}`;
        };

        audio.onwaiting = () => {
            if (!userWantsPlay) return;
            isLive = false;
            setUI('loading', '버퍼링 중...');
            clearTimeout(bufferTimer);
            bufferTimer = setTimeout(() => {
                debug.innerText = 'Buffer timeout — switching source...';
                tryNext();
            }, BUFFER_TIMEOUT);
        };

        audio.onstalled = () => {
            if (!userWantsPlay) return;
            debug.innerText = 'Network stalled — jumping to live edge...';
            jumpToLive();
        };

        audio.onerror = () => {
            if (!userWantsPlay) return;
            // HLS.js는 자체 에러 핸들러가 있으므로 네이티브 HLS(iOS)만 처리
            if (!hls) {
                debug.innerText = `Stream error — trying next...`;
                tryNext();
            }
        };

        // ── iOS 화면 복귀 시 자동 재개 ───────────────────────
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && userWantsPlay && audio.paused) {
                audio.play().catch(() => jumpToLive());
            }
        });
    });
    </script>
</body>
</html>
