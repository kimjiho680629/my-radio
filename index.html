<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MBC 라디오">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hR8Nf8x/mbc-icon.png">
    
    <title>MBC 표준FM LIVE (AU Edition)</title>
    <style>
        :root {
            --primary: #007aff;
            --bg: #0a0a0c;
            --card: rgba(28, 28, 30, 0.7);
            --text: #ffffff;
            --text-sub: #a1a1a6;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 122, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 45, 85, 0.1) 0%, transparent 40%);
            color: var(--text);
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%; max-width: 400px; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 듀얼 시계 스타일 */
        .clocks {
            display: flex; gap: 20px; margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px; border-radius: 20px;
            font-size: 0.8rem; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .clock-item { text-align: center; }
        .clock-label { color: var(--text-sub); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 2px; }
        .clock-time { font-family: "Courier New", monospace; font-weight: 700; color: #34c759; }

        .player-card {
            background: var(--card);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            width: 100%; border-radius: 44px; padding: 40px 30px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .station-logo {
            width: 70px; height: 70px; background: linear-gradient(135deg, #007aff, #5856d6);
            border-radius: 18px; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-weight: 900; font-size: 1.3rem;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        h1 { font-size: 1.6rem; margin: 0 0 4px 0; font-weight: 700; }
        .location-tag { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { width: 6px; height: 6px; background: #34c759; border-radius: 50%; animation: pulse 2s infinite; }

        /* 비주얼라이저 */
        .visualizer { display: flex; justify-content: center; align-items: center; gap: 4px; height: 35px; margin-bottom: 35px; }
        .bar { width: 4px; height: 6px; background: var(--primary); border-radius: 2px; }
        .playing .bar { animation: wave 1.2s infinite ease-in-out; }
        .bar:nth-child(1) { animation-delay: 0.0s; } .bar:nth-child(2) { animation-delay: 0.1s; } 
        .bar:nth-child(3) { animation-delay: 0.2s; } .bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes wave { 0%, 100% { height: 6px; } 50% { height: 30px; } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        #play-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: var(--text); color: var(--bg); cursor: pointer;
            display: flex; justify-content: center; align-items: center; margin: 0 auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #play-btn:active { transform: scale(0.9); }
        .play-icon { width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid var(--bg); margin-left: 5px; }
        .pause-icon { width: 20px; height: 24px; display: none; gap: 5px; }
        .pause-icon::before, .pause-icon::after { content: ''; flex: 1; background: var(--bg); border-radius: 2px; }
        .is-playing .play-icon { display: none; }
        .is-playing .pause-icon { display: flex; }
        .is-playing #play-btn { background: var(--primary); }
        .is-playing .pause-icon::before, .is-playing .pause-icon::after { background: white; }

        #status { margin-top: 25px; font-size: 0.85rem; color: var(--text-sub); }
        .network-info { position: absolute; bottom: 30px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); text-align: center; width: 100%; }
        
        @supports (padding-top: env(safe-area-inset-top)) {
            body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 듀얼 시계 추가 -->
        <div class="clocks">
            <div class="clock-item">
                <div class="clock-label">Sydney</div>
                <div class="clock-time" id="sydney-time">00:00:00</div>
            </div>
            <div style="color:rgba(255,255,255,0.2); align-self:center;">|</div>
            <div class="clock-item">
                <div class="clock-label">Seoul</div>
                <div class="clock-time" id="seoul-time">00:00:00</div>
            </div>
        </div>

        <div class="player-card">
            <div class="station-logo">MBC</div>
            <h1>표준FM</h1>
            <div class="location-tag">
                <span class="dot"></span>
                <span>AUSTRALIA ⇄ KOREA LIVE</span>
            </div>

            <div class="visualizer" id="viz">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <button id="play-btn">
                <div class="play-icon"></div>
                <div class="pause-icon"></div>
            </button>

            <div id="status">연결 대기 중</div>
        </div>
    </div>

    <div class="network-info">
        Optimized for Australia Edge Network<br>
        Direct Stream via Cloudflare Global CDN
    </div>

    <audio id="radio" playsinline webkit-playsinline preload="auto"></audio>

    <script>
        const audio = document.getElementById('radio');
        const btn = document.getElementById('play-btn');
        const status = document.getElementById('status');
        const viz = document.getElementById('viz');

        // 시계 기능
        function updateClocks() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            document.getElementById('sydney-time').innerText = now.toLocaleTimeString('ko-KR', { ...options, timeZone: 'Australia/Sydney' });
            document.getElementById('seoul-time').innerText = now.toLocaleTimeString('ko-KR', { ...options, timeZone: 'Asia/Seoul' });
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        const API_URL = 'https://sminiplay.imbc.com/aacplay.ashx?agent=webapp&channel=sfm';
        const FALLBACK_URL = 'https://minisw.imbc.com/dsfm/_definst_/sfm.stream/playlist.m3u8';

        let isPlaying = false;
        let reconnectTimeout;

        async function getStreamUrl() {
            try {
                const proxy = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxy + encodeURIComponent(API_URL));
                const text = await response.text();
                const match = text.match(/https?:\/\/[^\s"]+\.m3u8[^\s"]*/);
                return match ? match[0].replace('http://', 'https://') : FALLBACK_URL;
            } catch (e) { return FALLBACK_URL; }
        }

        async function startPlayback() {
            try {
                status.innerText = "서버 연결 중 (AU Network)...";
                const streamUrl = await getStreamUrl();
                audio.src = `${streamUrl}?t=${Date.now()}`;
                audio.load();
                await audio.play();
                setPlayingState(true);
                status.innerText = "● LIVE 방송 중";
            } catch (e) {
                status.innerText = "연결 실패 - 재시도 중";
                retry(3000);
            }
        }

        function setPlayingState(playing) {
            isPlaying = playing;
            if (playing) {
                btn.classList.add('is-playing');
                viz.classList.add('playing');
            } else {
                btn.classList.remove('is-playing');
                viz.classList.remove('playing');
                audio.pause();
            }
        }

        function retry(ms) {
            clearTimeout(reconnectTimeout);
            reconnectTimeout = setTimeout(() => { if (isPlaying) startPlayback(); }, ms);
        }

        btn.onclick = () => {
            if (isPlaying) {
                setPlayingState(false);
                status.innerText = "일시 정지됨";
                clearTimeout(reconnectTimeout);
            } else {
                startPlayback();
            }
        };

        audio.onwaiting = () => { if (isPlaying) status.innerText = "데이터 수신 중..."; };
        audio.onplaying = () => { if (isPlaying) status.innerText = "● LIVE 방송 중"; };
        audio.onerror = () => { if (isPlaying) { status.innerText = "네트워크 재연결 중..."; retry(2000); } };
        audio.onstalled = () => { if (isPlaying) startPlayback(); };

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isPlaying && audio.paused) startPlayback();
        });
    </script>
</body>
</html>
