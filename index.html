<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MBC 라디오">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hR8Nf8x/mbc-icon.png">
    
    <title>MBC 표준FM LIVE (AU Stability)</title>
    <style>
        :root { --primary: #007aff; --bg: #0a0a0c; --card: rgba(28, 28, 30, 0.8); --text: #ffffff; --text-sub: #a1a1a6; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        
        .player-card { 
            background: var(--card); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 44px; padding: 45px 30px; border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .clocks { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; font-size: 0.75rem; color: #34c759; font-weight: bold; }
        
        .station-logo { width: 65px; height: 65px; background: linear-gradient(135deg, #007aff, #5856d6); border-radius: 18px; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.2rem; box-shadow: 0 8px 16px rgba(0, 122, 255, 0.3); }
        
        h1 { font-size: 1.5rem; margin: 0 0 5px 0; }
        .status-badge { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 30px; display: inline-block; padding: 4px 12px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        
        .visualizer { display: flex; justify-content: center; align-items: center; gap: 5px; height: 40px; margin-bottom: 35px; }
        .bar { width: 4px; height: 8px; background: var(--primary); border-radius: 2px; }
        .playing .bar { animation: wave 1.2s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 40px; } }
        
        #play-btn { width: 85px; height: 85px; border-radius: 50%; border: none; background: white; color: black; cursor: pointer; display: flex; justify-content: center; align-items: center; margin: 0 auto; transition: 0.3s; }
        #play-btn:active { transform: scale(0.9); }
        .play-icon { width: 0; height: 0; border-top: 13px solid transparent; border-bottom: 13px solid transparent; border-left: 22px solid black; margin-left: 6px; }
        .pause-icon { width: 22px; height: 26px; display: none; gap: 6px; }
        .pause-icon::before, .pause-icon::after { content: ''; flex: 1; background: black; border-radius: 2px; }
        
        .is-playing .play-icon { display: none; }
        .is-playing .pause-icon { display: flex; }
        .is-playing #play-btn { background: var(--primary); }
        .is-playing .pause-icon::before, .is-playing .pause-icon::after { background: white; }

        #msg { margin-top: 25px; font-size: 0.85rem; color: #ff3b30; min-height: 1.2rem; }
        .log-info { position: absolute; bottom: 20px; font-size: 0.65rem; color: rgba(255,255,255,0.2); width: 100%; left: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="clocks">
            <span>SYD <span id="sydney-t">--:--</span></span>
            <span style="opacity:0.3">|</span>
            <span>SEL <span id="seoul-t">--:--</span></span>
        </div>
        <div class="player-card">
            <div class="station-logo">MBC</div>
            <h1>표준FM</h1>
            <div class="status-badge" id="badge">AUSTRALIA ⇄ SEOUL</div>
            
            <div class="visualizer" id="viz">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <button id="play-btn">
                <div class="play-icon"></div>
                <div class="pause-icon"></div>
            </button>
            <div id="msg" style="color: var(--text-sub);">버튼을 눌러 시작하세요</div>
        </div>
    </div>
    <div class="log-info" id="debug">System Ready</div>

    <audio id="radio" playsinline webkit-playsinline></audio>

    <script>
        const audio = document.getElementById('radio');
        const btn = document.getElementById('play-btn');
        const msg = document.getElementById('msg');
        const viz = document.getElementById('viz');
        const debug = document.getElementById('debug');

        // 시계
        function tick() {
            const d = new Date();
            const opt = { hour:'2-digit', minute:'2-digit', hour12:false };
            document.getElementById('sydney-t').innerText = d.toLocaleTimeString('en-AU', { ...opt, timeZone:'Australia/Sydney'});
            document.getElementById('seoul-t').innerText = d.toLocaleTimeString('ko-KR', { ...opt, timeZone:'Asia/Seoul'});
        }
        setInterval(tick, 1000); tick();

        // 스트림 설정 (가장 안정적인 순서대로)
        const SOURCES = [
            'https://minisw.imbc.com/dsfm/_definst_/sfm.stream/playlist.m3u8',
            'https://sfm-hls.imbc.com/sfm/sfm.stream/playlist.m3u8',
            'https://sminiplay.imbc.com/aacplay.ashx?agent=webapp&channel=sfm'
        ];

        let currentSourceIdx = 0;
        let isPlaying = false;

        async function fetchRealUrl(apiUrl) {
            const proxies = [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?',
                '' // 다이렉트 시도
            ];
            
            for (let p of proxies) {
                try {
                    debug.innerText = `Trying proxy: ${p || 'Direct'}`;
                    const res = await fetch(p + encodeURIComponent(apiUrl), { timeout: 5000 });
                    const text = await res.text();
                    const match = text.match(/https?:\/\/[^\s"]+\.m3u8[^\s"]*/);
                    if (match) return match[0].replace('http://', 'https://');
                } catch (e) { continue; }
            }
            return null;
        }

        async function playRadio() {
            msg.style.color = "var(--text-sub)";
            msg.innerText = "연결 중 (호주 서버 경유)...";
            
            try {
                let targetUrl = SOURCES[currentSourceIdx];
                
                // 만약 ashx 주소(API)라면 실제 주소 추출 시도
                if (targetUrl.includes('ashx')) {
                    const realUrl = await fetchRealUrl(targetUrl);
                    if (realUrl) targetUrl = realUrl;
                }

                debug.innerText = `Connecting to: ${targetUrl.substring(0, 40)}...`;
                
                audio.src = `${targetUrl}?t=${Date.now()}`;
                audio.load();
                
                await audio.play();
                
                isPlaying = true;
                btn.parentElement.classList.add('is-playing');
                viz.classList.add('playing');
                msg.innerText = "● LIVE 방송 중";
            } catch (e) {
                console.error(e);
                msg.style.color = "#ff3b30";
                msg.innerText = "연결 실패 - 다른 경로 시도 중";
                
                // 다음 소스로 전환하여 재시도
                currentSourceIdx = (currentSourceIdx + 1) % SOURCES.length;
                setTimeout(playRadio, 2000);
            }
        }

        btn.onclick = () => {
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                btn.parentElement.classList.remove('is-playing');
                viz.classList.remove('playing');
                msg.innerText = "일시 정지됨";
            } else {
                playRadio();
            }
        };

        // 아이폰 최적화 이벤트
        audio.onwaiting = () => { if(isPlaying) msg.innerText = "데이터 수신 중 (Buffering)..."; };
        audio.onplaying = () => { if(isPlaying) msg.innerText = "● LIVE 방송 중"; };
        audio.onerror = () => {
            if(isPlaying) {
                msg.innerText = "끊김 발생 - 재연결 시도";
                playRadio();
            }
        };

        // 백그라운드 복귀 시 자동 재생
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isPlaying && audio.paused) {
                audio.play().catch(() => playRadio());
            }
        });
    </script>
</body>
</html>
